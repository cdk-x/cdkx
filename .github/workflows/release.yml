name: Release

on:
  workflow_dispatch:
    inputs:
      group:
        description: 'Release group (core, cli, or leave empty for all)'
        required: false
        type: string
        default: ''
      dryRun:
        description: 'Dry run'
        required: false
        type: boolean
        default: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build release command
        id: build-command
        run: |
          COMMAND="yarn nx release"

          if [ -n "${{ github.event.inputs.group }}" ]; then
            COMMAND="$COMMAND --groups=${{ github.event.inputs.group }}"
          fi

          if [ "${{ github.event.inputs.dryRun }}" = "true" ]; then
            COMMAND="$COMMAND --dry-run"
          fi

          echo "command=$COMMAND" >> $GITHUB_OUTPUT

      - name: Run release
        run: ${{ steps.build-command.outputs.command }}
        env:
          NPM_CONFIG_PROVENANCE: true
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
