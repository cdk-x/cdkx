name: Release

on:
  workflow_dispatch:
    inputs:
      group:
        description: 'Release group (core, cli, or leave empty for all)'
        required: false
        type: string
        default: ''
      dryRun:
        description: 'Dry run'
        required: false
        type: boolean
        default: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      core_version: ${{ steps.core_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build release command
        id: build-command
        run: |
          COMMAND="yarn nx release"

          if [ -n "${{ github.event.inputs.group }}" ]; then
            COMMAND="$COMMAND --groups=${{ github.event.inputs.group }}"
          fi

          if [ "${{ github.event.inputs.dryRun }}" = "true" ]; then
            COMMAND="$COMMAND --dry-run"
          fi

          echo "command=$COMMAND" >> $GITHUB_OUTPUT

      - name: Run release
        run: ${{ steps.build-command.outputs.command }}
        env:
          NPM_CONFIG_PROVENANCE: true
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract core release version
        id: core_version
        if: github.event.inputs.dryRun != 'true'
        run: |
          git fetch --tags
          TAG=$(git tag --list "core-v*" --sort=-version:refname | head -1)
          if [ -n "$TAG" ]; then
            echo "version=${TAG#core-v}" >> $GITHUB_OUTPUT
          fi

  deploy-docs:
    needs: [release]
    if: |
      github.event.inputs.dryRun != 'true' &&
      (github.event.inputs.group == '' || github.event.inputs.group == 'core') &&
      needs.release.outputs.core_version != ''
    uses: ./.github/workflows/docs.yml
    with:
      version: ${{ needs.release.outputs.core_version }}
      alias: latest
    secrets: inherit
    permissions:
      contents: write
