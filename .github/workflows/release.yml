name: Release

on:
  workflow_dispatch:
    inputs:
      dryRun:
        description: 'Dry run'
        required: false
        type: boolean
        default: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      core_version: ${{ steps.core_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Configure npm auth
        run: |
          npm config set //registry.npmjs.org/:_authToken ${{ secrets.NPM_TOKEN }}
          yarn config set registry https://registry.npmjs.org
          yarn config set _authToken ${{ secrets.NPM_TOKEN }}

      - name: Configure git identity
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run release
        run: yarn nx release --yes${{ github.event.inputs.dryRun == 'true' && ' --dry-run' || '' }}
        env:
          NPM_CONFIG_PROVENANCE: true
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract core release version
        id: core_version
        if: github.event.inputs.dryRun != 'true'
        run: |
          git fetch --tags
          TAG=$(git tag --list "v*" --sort=-version:refname | head -1)
          if [ -n "$TAG" ]; then
            echo "version=${TAG#v}" >> $GITHUB_OUTPUT
          fi

  deploy-docs:
    needs: [release]
    if: |
      github.event.inputs.dryRun != 'true' &&
      needs.release.outputs.core_version != ''
    uses: ./.github/workflows/docs.yml
    with:
      version: ${{ needs.release.outputs.core_version }}
    secrets: inherit
    permissions:
      contents: write
