name: Docs

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g. 0.1.0 or dev)'
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        required: true
        type: string

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate TypeDoc API reference
        run: npx nx run-many -t docs --projects=@cdkx-io/core,@cdkx-io/hetzner

      - name: Copy TypeDoc into docs directory
        run: |
          mkdir -p docs/api
          cp -r typedoc-out/core docs/api/core
          cp -r typedoc-out/hetzner docs/api/hetzner

      - name: Deploy with mike
        env:
          VERSION: ${{ inputs.version }}
          ALIAS: latest
        run: |
          mike deploy --push --update-aliases ${{ env.VERSION }} ${{ env.ALIAS }}
          mike set-default --push ${{ env.ALIAS }}
